services:
  - type: web
    name: ocr-comptable
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GLM_API_KEY
        sync: false   # tu le mets manuellement dans le dashboard Render
    plan: free
